<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QA Manager — 測試管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F6F3;
  --surface:#FFFFFF;
  --border:#E8E6E0;
  --border-strong:#CCCAC3;
  --text:#1A1917;
  --text-2:#6B6960;
  --text-3:#A8A69F;
  --accent:#1E6B4E;
  --accent-bg:#EBF5EF;
  --accent-text:#1E6B4E;
  --sidebar-w:230px;
  --hdr:54px;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --radius:8px;
  --radius-lg:12px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;height:100vh;overflow:hidden;display:flex;flex-direction:column}
.app{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-brand{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.brand-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:600;flex-shrink:0}
.brand-name{font-weight:600;font-size:15px;letter-spacing:-.3px}
.sidebar-section{padding:12px 12px 6px;font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:.06em;text-transform:uppercase}
.proj-list{flex:1;overflow-y:auto;padding:4px 8px}
.proj-item{padding:8px 10px;border-radius:var(--radius);cursor:pointer;font-size:13px;color:var(--text-2);display:flex;align-items:center;gap:9px;margin-bottom:1px;transition:all .15s}
.proj-item:hover{background:var(--bg);color:var(--text)}
.proj-item.active{background:var(--accent-bg);color:var(--accent-text);font-weight:500}
.proj-dot{width:7px;height:7px;border-radius:50%;background:var(--border-strong);flex-shrink:0;transition:all .15s}
.proj-item.active .proj-dot{background:var(--accent)}
.proj-count{margin-left:auto;font-size:11px;background:var(--border);padding:1px 7px;border-radius:20px;color:var(--text-3)}
.proj-item.active .proj-count{background:rgba(30,107,78,.15);color:var(--accent)}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.add-proj-btn{width:100%;padding:8px 12px;border:1px dashed var(--border-strong);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:13px;color:var(--text-3);font-family:var(--font);transition:all .15s}
.add-proj-btn:hover{background:var(--bg);color:var(--text-2);border-color:var(--text-3)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--hdr);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:4px;flex-shrink:0}
.tab-btn{padding:6px 16px;border-radius:20px;border:none;background:transparent;font-size:13px;font-weight:500;cursor:pointer;color:var(--text-3);font-family:var(--font);transition:all .15s}
.tab-btn.active{background:var(--text);color:#fff}
.tab-btn:hover:not(.active){color:var(--text-2);background:var(--bg)}
.topbar-mid{flex:1;display:flex;justify-content:center}
.proj-crumb{font-size:13px;color:var(--text-2)}
.proj-crumb strong{color:var(--text)}
.topbar-right{display:flex;gap:8px;align-items:center}
.btn{padding:7px 16px;border-radius:var(--radius);border:1px solid var(--border-strong);background:var(--surface);font-size:13px;cursor:pointer;color:var(--text);font-family:var(--font);font-weight:500;transition:all .15s}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--accent);color:#fff;border-color:transparent}
.btn-primary:hover{opacity:.88}
.content{flex:1;overflow-y:auto;padding:24px}

/* TABLE */
.tc-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.search-wrap{position:relative;flex:1;max-width:300px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);font-size:14px;pointer-events:none}
.search-box{width:100%;padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);font-family:var(--font);transition:border .15s;outline:none}
.search-box:focus{border-color:var(--accent)}
.filter-sel{padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);font-family:var(--font);outline:none;cursor:pointer}
.filter-sel:focus{border-color:var(--accent)}
.tc-count{margin-left:auto;font-size:12px;color:var(--text-3)}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.tc-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.tc-table th{text-align:left;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-weight:600;font-size:11px;color:var(--text-3);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.tc-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-table tr:last-child td{border-bottom:none}
.tc-table tbody tr:hover td{background:#FAFAF8;cursor:pointer}
.id-cell{font-family:var(--mono);font-size:11px;color:var(--text-3)}
.title-cell{font-weight:500;color:var(--text)}

/* BADGES */
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.p-critical{background:#FEE2E2;color:#991B1B}
.p-high{background:#FEF3C7;color:#92400E}
.p-medium{background:#DBEAFE;color:#1E40AF}
.p-low{background:#D1FAE5;color:#065F46}
.cat-badge{background:var(--bg);color:var(--text-2);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border)}
.status-on{background:#D1FAE5;color:#065F46;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.status-off{background:var(--bg);color:var(--text-3);padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border)}
.ai-tag{background:#EDE9FE;color:#5B21B6;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;margin-right:3px}
.auto-yes{color:var(--accent);font-weight:500}
.auto-no{color:var(--text-3)}

.edit-btn{padding:4px 12px;border:1px solid var(--border);border-radius:var(--radius);background:transparent;cursor:pointer;font-size:12px;color:var(--text-2);font-family:var(--font);transition:all .15s}
.edit-btn:hover{background:var(--bg);color:var(--text);border-color:var(--border-strong)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-3)}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty-text{font-size:14px}

/* EXEC VIEW */
.exec-toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:18px}
.ms-grid{display:flex;flex-direction:column;gap:14px}
.ms-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.ms-hdr{padding:14px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s;user-select:none}
.ms-hdr:hover{background:var(--bg)}
.ms-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--accent);padding:2px 8px;border-radius:4px}
.ms-title{font-weight:600;font-size:14px}
.ms-meta{font-size:12px;color:var(--text-3);margin-left:auto;display:flex;gap:12px}
.ms-chevron{color:var(--text-3);transition:transform .2s;font-size:12px}
.ms-chevron.open{transform:rotate(90deg)}
.ms-body{padding:0 18px 14px;display:none}
.ms-body.open{display:block}
.tp-list{display:flex;flex-direction:column;gap:10px}
.tp-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
.tp-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tp-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#1E40AF;background:#DBEAFE;padding:2px 7px;border-radius:4px}
.tp-name{font-weight:600;font-size:13px}
.tp-meta{margin-left:auto;font-size:12px;color:var(--text-3)}
.tr-list{display:flex;flex-direction:column;gap:6px}
.tr-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.tr-item:hover{border-color:var(--accent);box-shadow:0 0 0 2px rgba(30,107,78,.08)}
.tr-label{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#92400E;background:#FEF3C7;padding:2px 7px;border-radius:4px}
.tr-name{font-size:13px;font-weight:500}
.tr-progress{display:flex;align-items:center;gap:6px;margin-left:auto}
.prog-bar{width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.prog-text{font-size:11px;color:var(--text-3);min-width:40px}
.tr-arr{color:var(--text-3);font-size:12px}

/* RUN DETAIL */
.run-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.run-detail-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;background:var(--bg)}
.run-back{cursor:pointer;color:var(--text-2);font-size:13px;display:flex;align-items:center;gap:5px;font-weight:500;padding:5px 10px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);transition:all .15s}
.run-back:hover{background:var(--bg);color:var(--text)}
.run-title{font-weight:600;font-size:15px}
.run-stats{margin-left:auto;display:flex;gap:16px}
.run-stat{font-size:12px;color:var(--text-3)}
.run-stat strong{color:var(--text)}
.run-table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
.run-table th{text-align:left;padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);font-weight:600;font-size:11px;color:var(--text-3);letter-spacing:.05em;text-transform:uppercase}
.run-table td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.run-table tr:last-child td{border-bottom:none}
.run-table tbody tr:hover td{background:#FAFAF8}
.result-sel{padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;background:var(--surface);color:var(--text);font-family:var(--font);cursor:pointer;outline:none;transition:border .15s}
.result-sel:focus{border-color:var(--accent)}
.assignee{display:inline-flex;align-items:center;gap:6px;font-size:13px}
.av{width:22px;height:22px;border-radius:50%;background:var(--accent-bg);color:var(--accent);font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid rgba(30,107,78,.2)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.overlay.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);width:680px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center}
.modal-title{font-weight:600;font-size:16px;flex:1}
.modal-close{background:none;border:none;cursor:pointer;font-size:20px;color:var(--text-3);line-height:1;padding:2px 6px;border-radius:4px;transition:all .15s}
.modal-close:hover{background:var(--bg);color:var(--text)}
.modal-body{padding:22px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.field{display:flex;flex-direction:column;gap:6px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em}
.field input,.field select,.field textarea{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--surface);color:var(--text);font-family:var(--font);outline:none;transition:border .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field input[readonly]{background:var(--bg);color:var(--text-3)}
.field textarea{resize:vertical;min-height:72px;line-height:1.6}
.modal-footer{padding:16px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}

/* NEW PROJECT MODAL */
.sm-modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.sm-modal .modal-body{display:flex;flex-direction:column;gap:14px;grid-template-columns:none}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}
</style>
</head>
<body>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">Q</div>
      <span class="brand-name">QA Manager</span>
    </div>
    <div class="sidebar-section">專案</div>
    <div class="proj-list" id="projList"></div>
    <div class="sidebar-footer">
      <button class="add-proj-btn" onclick="openNewProj()">+ 新增專案</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <button class="tab-btn active" id="tabCases" onclick="switchTab('cases')">Test Cases</button>
      <button class="tab-btn" id="tabExec" onclick="switchTab('exec')">執行管理</button>
      <div class="topbar-mid">
        <span class="proj-crumb" id="projCrumb"></span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-primary" id="addBtn" onclick="openAdd()">+ 新增案例</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- CASE MODAL -->
<div class="overlay" id="caseModal">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="modalTitle">新增測試案例</span>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="field"><label>ID</label><input id="fId" placeholder="TC-001" readonly></div>
      <div class="field"><label>Category</label>
        <select id="fCat"><option>Functional</option><option>UI/UX</option><option>Performance</option><option>Security</option><option>Integration</option><option>Regression</option></select>
      </div>
      <div class="field full"><label>Title</label><input id="fTitle" placeholder="測試案例標題"></div>
      <div class="field"><label>Priority</label>
        <select id="fPri"><option value="Critical">Critical</option><option value="High">High</option><option value="Medium" selected>Medium</option><option value="Low">Low</option></select>
      </div>
      <div class="field"><label>Case Status</label>
        <select id="fStatus"><option value="Enable">Enable</option><option value="Disable">Disable</option></select>
      </div>
      <div class="field full"><label>Pre-condition</label><textarea id="fPre" placeholder="執行前提條件..."></textarea></div>
      <div class="field full"><label>Steps</label><textarea id="fStep" style="min-height:96px" placeholder="1. 步驟一&#10;2. 步驟二&#10;3. 步驟三"></textarea></div>
      <div class="field full"><label>Expected Result</label><textarea id="fExp" placeholder="預期結果..."></textarea></div>
      <div class="field"><label>Auto Cover</label>
        <select id="fAuto"><option value="Yes">Yes</option><option value="No" selected>No</option><option value="Partial">Partial</option></select>
      </div>
      <div class="field"><label>AI Tag</label><input id="fAI" placeholder="login, checkout"></div>
      <div class="field"><label>Creator</label><input id="fCreator" placeholder="名字"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveCase()">儲存</button>
    </div>
  </div>
</div>

<!-- NEW PROJECT MODAL -->
<div class="overlay" id="projModal">
  <div class="sm-modal">
    <div class="modal-hdr">
      <span class="modal-title">新增專案</span>
      <button class="modal-close" onclick="closeProjModal()">&#x2715;</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:14px;grid-template-columns:none">
      <div class="field"><label>專案名稱</label><input id="pjName" placeholder="My Project"></div>
      <div class="field"><label>說明（選填）</label><input id="pjDesc" placeholder="簡短說明"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeProjModal()">取消</button>
      <button class="btn btn-primary" onclick="saveProject()">建立</button>
    </div>
  </div>
</div>

<script>
const state = {
  projects: [
    {id:'p1', name:'Web Portal', desc:'主要網頁入口'},
    {id:'p2', name:'Mobile App', desc:'iOS & Android'}
  ],
  cases: {
    p1:[
      {id:'TC-001',title:'使用者登入 - 正確帳密',cat:'Functional',pri:'Critical',pre:'使用者已有帳號',step:'1. 開啟登入頁\n2. 輸入正確帳密\n3. 點擊登入',exp:'成功跳轉至首頁',auto:'Yes',ai:'login,auth',creator:'Alice',status:'Enable'},
      {id:'TC-002',title:'使用者登入 - 錯誤密碼',cat:'Functional',pri:'High',pre:'使用者已有帳號',step:'1. 開啟登入頁\n2. 輸入錯誤密碼\n3. 點擊登入',exp:'顯示錯誤訊息',auto:'Yes',ai:'login',creator:'Alice',status:'Enable'},
      {id:'TC-003',title:'商品加入購物車',cat:'Functional',pri:'High',pre:'使用者已登入',step:'1. 搜尋商品\n2. 點擊加入購物車',exp:'購物車數量+1',auto:'No',ai:'cart,checkout',creator:'Bob',status:'Enable'},
      {id:'TC-004',title:'結帳流程驗證',cat:'Integration',pri:'Critical',pre:'購物車有商品',step:'1. 進入結帳\n2. 填寫地址\n3. 付款',exp:'訂單成立',auto:'Partial',ai:'checkout,payment',creator:'Carol',status:'Enable'},
      {id:'TC-005',title:'頁面載入速度',cat:'Performance',pri:'Medium',pre:'網路正常',step:'1. 開啟首頁\n2. 計時',exp:'< 2s',auto:'Yes',ai:'perf',creator:'Bob',status:'Disable'},
    ],
    p2:[
      {id:'TC-001',title:'App 啟動畫面',cat:'UI/UX',pri:'Medium',pre:'App 已安裝',step:'1. 啟動 App',exp:'顯示 Splash 畫面',auto:'No',ai:'launch',creator:'Dave',status:'Enable'},
      {id:'TC-002',title:'推播通知接收',cat:'Functional',pri:'High',pre:'已允許通知',step:'1. 觸發通知\n2. 觀察推播',exp:'收到推播',auto:'No',ai:'push,notification',creator:'Dave',status:'Enable'},
    ]
  },
  milestones: {
    p1:[
      {id:'ms1', name:'Q2 2025 Release', open:true, plans:[
        {id:'tp1', name:'Login & Auth 測試計劃', runs:[
          {id:'tr1', name:'Smoke Test Run', cases:[
            {tcId:'TC-001',runId:'TR-001',assignee:'Alice',result:'Pass'},
            {tcId:'TC-002',runId:'TR-002',assignee:'Alice',result:'Pass'},
          ]},
          {id:'tr2', name:'Regression Run', cases:[
            {tcId:'TC-001',runId:'TR-003',assignee:'Bob',result:'Pass'},
            {tcId:'TC-002',runId:'TR-004',assignee:'Carol',result:'Fail'},
            {tcId:'TC-003',runId:'TR-005',assignee:'Bob',result:'Pending'},
          ]}
        ]},
        {id:'tp2', name:'Checkout 測試計劃', runs:[
          {id:'tr3', name:'Integration Run', cases:[
            {tcId:'TC-003',runId:'TR-006',assignee:'Carol',result:'Skip'},
            {tcId:'TC-004',runId:'TR-007',assignee:'Alice',result:'Pending'},
          ]}
        ]}
      ]},
      {id:'ms2', name:'Q3 2025 Release', open:false, plans:[
        {id:'tp3', name:'Performance Plan', runs:[
          {id:'tr4', name:'Load Test Run', cases:[
            {tcId:'TC-005',runId:'TR-008',assignee:'Dave',result:'Pending'},
          ]}
        ]}
      ]}
    ],
    p2:[
      {id:'ms3', name:'v1.0 Launch', open:true, plans:[
        {id:'tp4', name:'Core Features Plan', runs:[
          {id:'tr5', name:'Sanity Run', cases:[
            {tcId:'TC-001',runId:'TR-009',assignee:'Dave',result:'Pass'},
            {tcId:'TC-002',runId:'TR-010',assignee:'Dave',result:'Pending'},
          ]}
        ]}
      ]}
    ]
  },
  currentProj: 'p1',
  currentTab: 'cases',
  editingCase: null,
  viewingRun: null,
  caseCounter: {p1:6, p2:3},
  msOpen: {}
};

const priColor = {Critical:'p-critical',High:'p-high',Medium:'p-medium',Low:'p-low'};
const avColors = ['#1E6B4E','#1E40AF','#92400E','#5B21B6','#991B1B'];
function av(name){return (name||'?').slice(0,2).toUpperCase();}

function switchTab(t){
  state.currentTab=t;
  state.viewingRun=null;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(t==='cases'?'tabCases':'tabExec').classList.add('active');
  document.getElementById('addBtn').style.display=t==='cases'?'':'none';
  render();
}

function setProject(id){
  state.currentProj=id;
  state.viewingRun=null;
  render();
}

function renderSidebar(){
  const list=document.getElementById('projList');
  list.innerHTML=state.projects.map(p=>{
    const cnt=(state.cases[p.id]||[]).length;
    return `<div class="proj-item${p.id===state.currentProj?' active':''}" onclick="setProject('${p.id}')">
      <div class="proj-dot"></div>${p.name}
      <span class="proj-count">${cnt}</span>
    </div>`;
  }).join('');
  const proj=state.projects.find(p=>p.id===state.currentProj);
  document.getElementById('projCrumb').innerHTML=proj?`<strong>${proj.name}</strong>`:'';
}

function renderCases(){
  const cases=state.cases[state.currentProj]||[];
  document.getElementById('content').innerHTML=`
    <div class="tc-toolbar">
      <div class="search-wrap">
        <span class="search-icon">&#x2315;</span>
        <input class="search-box" placeholder="搜尋 ID、Title、Creator..." oninput="filterCases(this.value)" id="searchBox">
      </div>
      <select class="filter-sel" onchange="filterCases(document.getElementById('searchBox').value)" id="catFilter">
        <option value="">所有 Category</option>
        <option>Functional</option><option>UI/UX</option><option>Performance</option>
        <option>Security</option><option>Integration</option><option>Regression</option>
      </select>
      <select class="filter-sel" onchange="filterCases(document.getElementById('searchBox').value)" id="priFilter">
        <option value="">所有 Priority</option>
        <option>Critical</option><option>High</option><option>Medium</option><option>Low</option>
      </select>
      <span class="tc-count" id="tcCount">${cases.length} 個案例</span>
    </div>
    <div class="table-wrap">
    <table class="tc-table">
      <colgroup>
        <col style="width:82px"><col style="width:auto"><col style="width:110px">
        <col style="width:90px"><col style="width:68px"><col style="width:78px">
        <col style="width:130px"><col style="width:72px"><col style="width:65px">
      </colgroup>
      <thead><tr>
        <th>ID</th><th>Title</th><th>Category</th>
        <th>Priority</th><th>Auto</th><th>Status</th>
        <th>AI Tag</th><th>Creator</th><th></th>
      </tr></thead>
      <tbody id="tcBody"></tbody>
    </table></div>`;
  renderRows(cases);
}

function renderRows(cases){
  const body=document.getElementById('tcBody');
  if(!body)return;
  document.getElementById('tcCount').textContent=cases.length+' 個案例';
  if(!cases.length){
    body.innerHTML=`<tr><td colspan="9"><div class="empty-state"><div class="empty-icon">&#x1F50D;</div><div class="empty-text">找不到測試案例</div></div></td></tr>`;
    return;
  }
  body.innerHTML=cases.map(c=>`
    <tr onclick="openEdit('${c.id}')">
      <td class="id-cell">${c.id}</td>
      <td class="title-cell">${c.title}</td>
      <td><span class="cat-badge">${c.cat}</span></td>
      <td><span class="badge ${priColor[c.pri]||'p-medium'}">${c.pri}</span></td>
      <td class="${c.auto==='Yes'?'auto-yes':'auto-no'}">${c.auto}</td>
      <td><span class="${c.status==='Enable'?'status-on':'status-off'}">${c.status}</span></td>
      <td>${c.ai?c.ai.split(',').map(t=>`<span class="ai-tag">${t.trim()}</span>`).join(''):'<span style="color:var(--text-3);font-size:12px">—</span>'}</td>
      <td style="font-size:12px;color:var(--text-2)">${c.creator}</td>
      <td><button class="edit-btn" onclick="event.stopPropagation();openEdit('${c.id}')">編輯</button></td>
    </tr>`).join('');
}

function filterCases(q){
  const cases=state.cases[state.currentProj]||[];
  const cat=document.getElementById('catFilter')?.value||'';
  const pri=document.getElementById('priFilter')?.value||'';
  const filtered=cases.filter(c=>{
    const matchQ=!q||(c.title+c.id+c.creator+(c.ai||'')).toLowerCase().includes(q.toLowerCase());
    const matchCat=!cat||c.cat===cat;
    const matchPri=!pri||c.pri===pri;
    return matchQ&&matchCat&&matchPri;
  });
  renderRows(filtered);
}

function renderExec(){
  if(state.viewingRun){renderRunDetail();return;}
  const ms=state.milestones[state.currentProj]||[];
  document.getElementById('content').innerHTML=`
    <div class="exec-toolbar">
      <button class="btn">+ Milestone</button>
      <button class="btn">+ Test Plan</button>
      <button class="btn btn-primary">+ Test Run</button>
    </div>
    <div class="ms-grid">${ms.length?ms.map(renderMS).join(''):`<div style="text-align:center;padding:60px;color:var(--text-3)"><div style="font-size:32px;margin-bottom:12px">&#x1F4CB;</div><div>尚無執行計劃</div></div>`}</div>`;
}

function renderMS(ms){
  const isOpen=state.msOpen[ms.id]===undefined?ms.open:state.msOpen[ms.id];
  const totalRuns=ms.plans.reduce((s,p)=>s+p.runs.length,0);
  const totalCases=ms.plans.reduce((s,p)=>p.runs.reduce((ss,r)=>ss+r.cases.length,s),0);
  const passed=ms.plans.reduce((s,p)=>p.runs.reduce((ss,r)=>ss+r.cases.filter(c=>c.result==='Pass').length,s),0);
  return `<div class="ms-card">
    <div class="ms-hdr" onclick="toggleMS('${ms.id}')">
      <span class="ms-label">MS</span>
      <span class="ms-title">${ms.name}</span>
      <span class="ms-meta">
        <span>${ms.plans.length} plans</span>
        <span>${totalRuns} runs</span>
        <span style="color:var(--accent);font-weight:600">${passed}/${totalCases} Pass</span>
      </span>
      <span class="ms-chevron${isOpen?' open':''}">&#x276F;</span>
    </div>
    <div class="ms-body${isOpen?' open':''}">
      <div class="tp-list">${ms.plans.map(tp=>renderTP(tp)).join('')}</div>
    </div>
  </div>`;
}

function renderTP(tp){
  return `<div class="tp-card">
    <div class="tp-row">
      <span class="tp-label">PLAN</span>
      <span class="tp-name">${tp.name}</span>
      <span class="tp-meta">${tp.runs.length} test runs</span>
    </div>
    <div class="tr-list">${tp.runs.map(tr=>renderTR(tr)).join('')}</div>
  </div>`;
}

function renderTR(tr){
  const total=tr.cases.length;
  const passed=tr.cases.filter(c=>c.result==='Pass').length;
  const pct=total?Math.round(passed/total*100):0;
  return `<div class="tr-item" onclick="viewRun('${tr.id}')">
    <span class="tr-label">RUN</span>
    <span class="tr-name">${tr.name}</span>
    <span class="tr-progress">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="prog-text">${passed}/${total} Pass</span>
    </span>
    <span class="tr-arr">&#x276F;</span>
  </div>`;
}

function toggleMS(id){
  const cur=state.msOpen[id]===undefined?(state.milestones[state.currentProj]||[]).find(m=>m.id===id)?.open:state.msOpen[id];
  state.msOpen[id]=!cur;
  renderExec();
}

function viewRun(runId){state.viewingRun=runId;renderRunDetail();}

function findRun(runId){
  for(const m of state.milestones[state.currentProj]||[])
    for(const tp of m.plans)
      for(const tr of tp.runs)
        if(tr.id===runId)return tr;
  return null;
}

function renderRunDetail(){
  const run=findRun(state.viewingRun);
  if(!run){state.viewingRun=null;renderExec();return;}
  const cases=state.cases[state.currentProj]||[];
  const passed=run.cases.filter(c=>c.result==='Pass').length;
  const failed=run.cases.filter(c=>c.result==='Fail').length;
  const rows=run.cases.map(rc=>{
    const tc=cases.find(c=>c.id===rc.tcId)||{title:rc.tcId,pri:'Medium',cat:'-'};
    return `<tr>
      <td class="id-cell">${rc.runId}</td>
      <td class="id-cell">${rc.tcId}</td>
      <td style="font-weight:500;color:var(--text)">${tc.title}</td>
      <td><span class="badge ${priColor[tc.pri]||'p-medium'}">${tc.pri}</span></td>
      <td><span class="cat-badge">${tc.cat}</span></td>
      <td><div class="assignee"><div class="av">${av(rc.assignee)}</div>${rc.assignee||'—'}</div></td>
      <td>
        <select class="result-sel" onchange="updateResult('${state.viewingRun}','${rc.runId}',this.value)">
          ${['Pending','Pass','Fail','Skip'].map(r=>`<option${r===rc.result?' selected':''}>${r}</option>`).join('')}
        </select>
      </td>
    </tr>`;
  }).join('');
  document.getElementById('content').innerHTML=`
    <div class="run-detail">
      <div class="run-detail-hdr">
        <div class="run-back" onclick="backToExec()">&#x2190; 執行管理</div>
        <span class="run-title">${run.name}</span>
        <div class="run-stats">
          <span class="run-stat"><strong>${run.cases.length}</strong> 案例</span>
          <span class="run-stat" style="color:var(--accent)"><strong>${passed}</strong> Pass</span>
          <span class="run-stat" style="color:#991B1B"><strong>${failed}</strong> Fail</span>
        </div>
      </div>
      <div style="overflow-x:auto">
      <table class="run-table">
        <colgroup>
          <col style="width:85px"><col style="width:75px"><col style="width:auto">
          <col style="width:85px"><col style="width:110px"><col style="width:120px"><col style="width:100px">
        </colgroup>
        <thead><tr>
          <th>Run ID</th><th>Case ID</th><th>Title</th>
          <th>Priority</th><th>Category</th><th>Assignee</th><th>Result</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}

function updateResult(runId,runCaseId,val){
  for(const m of state.milestones[state.currentProj]||[])
    for(const tp of m.plans)
      for(const tr of tp.runs)
        if(tr.id===runId){const rc=tr.cases.find(c=>c.runId===runCaseId);if(rc)rc.result=val;}
}

function backToExec(){state.viewingRun=null;renderExec();}

function render(){
  renderSidebar();
  if(state.currentTab==='cases')renderCases();
  else renderExec();
}

function openAdd(){
  state.editingCase=null;
  const proj=state.currentProj;
  const n=state.caseCounter[proj]||1;
  document.getElementById('fId').value='TC-'+String(n).padStart(3,'0');
  ['fTitle','fPre','fStep','fExp','fAI','fCreator'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fCat').value='Functional';
  document.getElementById('fPri').value='Medium';
  document.getElementById('fStatus').value='Enable';
  document.getElementById('fAuto').value='No';
  document.getElementById('modalTitle').textContent='新增測試案例';
  document.getElementById('caseModal').classList.add('open');
}

function openEdit(id){
  const c=(state.cases[state.currentProj]||[]).find(x=>x.id===id);
  if(!c)return;
  state.editingCase=id;
  document.getElementById('fId').value=c.id;
  document.getElementById('fTitle').value=c.title;
  document.getElementById('fCat').value=c.cat;
  document.getElementById('fPri').value=c.pri;
  document.getElementById('fStatus').value=c.status;
  document.getElementById('fPre').value=c.pre;
  document.getElementById('fStep').value=c.step;
  document.getElementById('fExp').value=c.exp;
  document.getElementById('fAuto').value=c.auto;
  document.getElementById('fAI').value=c.ai||'';
  document.getElementById('fCreator').value=c.creator;
  document.getElementById('modalTitle').textContent='編輯測試案例';
  document.getElementById('caseModal').classList.add('open');
}

function closeModal(){document.getElementById('caseModal').classList.remove('open');}

function saveCase(){
  const proj=state.currentProj;
  if(!state.cases[proj])state.cases[proj]=[];
  const data={
    id:document.getElementById('fId').value,
    title:document.getElementById('fTitle').value||'(未命名)',
    cat:document.getElementById('fCat').value,
    pri:document.getElementById('fPri').value,
    status:document.getElementById('fStatus').value,
    pre:document.getElementById('fPre').value,
    step:document.getElementById('fStep').value,
    exp:document.getElementById('fExp').value,
    auto:document.getElementById('fAuto').value,
    ai:document.getElementById('fAI').value,
    creator:document.getElementById('fCreator').value
  };
  if(state.editingCase){
    const idx=state.cases[proj].findIndex(c=>c.id===state.editingCase);
    if(idx>=0)state.cases[proj][idx]=data;
  } else {
    state.cases[proj].push(data);
    state.caseCounter[proj]=(state.caseCounter[proj]||1)+1;
  }
  closeModal();
  render();
}

function openNewProj(){
  document.getElementById('pjName').value='';
  document.getElementById('pjDesc').value='';
  document.getElementById('projModal').classList.add('open');
}
function closeProjModal(){document.getElementById('projModal').classList.remove('open');}
function saveProject(){
  const name=document.getElementById('pjName').value.trim();
  if(!name)return;
  const id='p'+Date.now();
  state.projects.push({id,name,desc:document.getElementById('pjDesc').value});
  state.cases[id]=[];
  state.milestones[id]=[];
  state.caseCounter[id]=1;
  closeProjModal();
  setProject(id);
  render();
}

render();
</script>
</body>
</html>
